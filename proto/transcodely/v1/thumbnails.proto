// Thumbnail generation configuration.
syntax = "proto3";

package transcodely.v1;

import "buf/validate/validate.proto";

// Thumbnail generation mode.
enum ThumbnailMode {
  THUMBNAIL_MODE_UNSPECIFIED = 0;

  // Extract a single frame at a specific timestamp.
  THUMBNAIL_MODE_SINGLE = 1;

  // Extract frames at regular intervals.
  THUMBNAIL_MODE_INTERVAL = 2;

  // Combine frames into a CSS sprite sheet grid with WebVTT.
  THUMBNAIL_MODE_SPRITE = 3;

  // Extract frames at explicit timestamps.
  THUMBNAIL_MODE_TIMESTAMPS = 4;

  // Generate short animated hover-preview loops for card/grid previews.
  //
  // Free and bundled — animated previews add NO cost to a job (thumbnails are
  // priced at 0). By default the worker produces BOTH an animated WebP and a
  // muted MP4 loop from the same samples, so a consumer can pick whichever its
  // surface supports. Set `format = webp` to emit only the WebP.
  //
  // Sampling is deterministic: unless `start_offsets` is set, clips are taken at
  // fixed 25% / 50% / 75% marks of the source duration (no scene detection).
  // Smart defaults (applied worker-side; the API stores exactly what was sent):
  // ~4 s total duration, 12 fps, 320 px wide.
  //
  // The animated WebP is hard-capped at 10 s: when `duration_seconds` exceeds
  // 10 the WebP is skipped and the output is MP4-only (documented, not an
  // error) — unless `format = webp` is set explicitly, in which case a
  // `duration_seconds` above 10 is rejected at job creation.
  //
  // Valid config for this mode: `width`, `height`, `quality` (maps to WebP
  // encode quality), `duration_seconds`, `fps`, `start_offsets`, `path_template`.
  // The single/interval/sprite/timestamps fields (`timestamp`,
  // `interval_seconds`, `timestamps`, `sprite_columns`) are not valid here.
  THUMBNAIL_MODE_ANIMATED = 5;
}

// Thumbnail output format.
enum ThumbnailFormat {
  THUMBNAIL_FORMAT_UNSPECIFIED = 0;
  THUMBNAIL_FORMAT_JPEG = 1;
  THUMBNAIL_FORMAT_PNG = 2;
  THUMBNAIL_FORMAT_WEBP = 3;
}

// Thumbnail generation specification.
// Configures how thumbnails are extracted from the input video.
message ThumbnailSpec {
  // Generation mode (required).
  ThumbnailMode mode = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  // Output format. Default: jpeg.
  ThumbnailFormat format = 2 [
    (buf.validate.field).enum.defined_only = true
  ];

  // Output width in pixels. If only width is set, height is proportional.
  optional int32 width = 3 [
    (buf.validate.field).int32.gte = 16,
    (buf.validate.field).int32.lte = 3840
  ];

  // Output height in pixels. If only height is set, width is proportional.
  optional int32 height = 4 [
    (buf.validate.field).int32.gte = 16,
    (buf.validate.field).int32.lte = 2160
  ];

  // JPEG/WebP quality (1-100). Default: 80. Ignored for PNG.
  optional int32 quality = 5 [
    (buf.validate.field).int32.gte = 1,
    (buf.validate.field).int32.lte = 100
  ];

  // Timestamp in seconds for single mode.
  optional double timestamp = 6 [
    (buf.validate.field).double.gte = 0
  ];

  // Interval in seconds between frames (interval and sprite modes).
  // Range: 0.5-300 seconds. Default: 10.
  optional double interval_seconds = 7 [
    (buf.validate.field).double.gte = 0.5,
    (buf.validate.field).double.lte = 300
  ];

  // Explicit timestamps in seconds (timestamps mode).
  repeated double timestamps = 8;

  // Number of columns in sprite sheet grid (sprite mode only).
  // Range: 1-20. Default: 10.
  optional int32 sprite_columns = 9 [
    (buf.validate.field).int32.gte = 1,
    (buf.validate.field).int32.lte = 20
  ];

  // Per-thumbnail storage path template, resolved by the worker with
  // thumbnail-aware variables. Precedence: this field, then the output origin's
  // path_template, then the built-in default {job_id}/thumbnails/thumb_{thumb_index}.
  // The job-level output_path_template is NOT applied to thumbnails (it is
  // documented as applying to every output; thumbnails aren't outputs).
  //
  // Variables: {job_id}, {video_id}, {date}, {timestamp}, {uuid},
  // {format} (image format: jpeg|png|webp), {thumb_index} (0-based),
  // {thumb_time} (seconds, file-safe), {thumb_time_ms} (milliseconds).
  //
  // Output-only variables ({output_id}, {codec}, {resolution}, {bitrate},
  // {quality}, {preset_id}, {output_index}, {segment_*}) are NOT valid here — a
  // thumbnail is not a rendition, so a thumbnail render context can't resolve
  // them and the literal token would land in the storage key. Setting one is a
  // validation error. (When a thumbnail INHERITS the output origin's template
  // instead, those variables are stripped automatically.)
  //
  // Example: "video/{video_id}/poster/{thumb_index}".
  //
  // Must not start with `/` or contain `..` (no path traversal). When set, it
  // must reference a uniqueness token ({job_id}, {video_id}, or {uuid}) so
  // thumbnails from different jobs never collide on a shared origin. Unset →
  // the default above (existing keys unchanged).
  optional string path_template = 10 [
    (buf.validate.field).string.max_len = 512,
    (buf.validate.field).cel = {
      id: "thumbnail_spec.path_template_safe"
      message: "path_template must not start with `/` or contain `..`"
      expression: "this == '' || (!this.startsWith('/') && !this.contains('..'))"
    }
  ];

  // Total length of each animated preview clip, in seconds (animated mode only).
  // Range: 2-30. Default (unset): ~4 s, applied worker-side. The animated WebP
  // is hard-capped at 10 s: above 10 s the WebP is skipped and only the MP4 loop
  // is produced (unless format=webp is set explicitly, which then rejects
  // duration_seconds > 10). Only valid for animated mode.
  optional double duration_seconds = 11 [
    (buf.validate.field).double.gte = 2,
    (buf.validate.field).double.lte = 30
  ];

  // Frames per second of the animated preview (animated mode only).
  // Range: 8-15. Default (unset): 12, applied worker-side. Only valid for
  // animated mode.
  optional int32 fps = 12 [
    (buf.validate.field).int32.gte = 8,
    (buf.validate.field).int32.lte = 15
  ];

  // Explicit clip start offsets in seconds from the source start (animated mode
  // only). When set (max 3 entries, each >= 0), these replace the default
  // 25%/50%/75% sampling marks; the worker clamps each offset to the source
  // duration. Unset → the deterministic 25%/50%/75% marks. Only valid for
  // animated mode.
  repeated double start_offsets = 13 [
    (buf.validate.field).repeated = {
      max_items: 3
      items: {
        double: {gte: 0}
      }
    }
  ];
}

// A single generated thumbnail artifact, reported by the worker on job
// completion and surfaced on the Job response. Mirrors the rendition pattern:
// the worker computes both the storage key and the storage URL, and the API
// persists them verbatim (the same way JobOutput.output_url works). One
// ThumbnailSpec can yield many ThumbnailResults (interval → N frames; sprite →
// image + .vtt sidecar), correlated back via mode + index.
message ThumbnailResult {
  // Storage key relative to the output origin
  // (e.g. "job_xxx/thumbnails/thumb_0.jpg"). Stable identifier for the file.
  string storage_key = 1 [
    (buf.validate.field).required = true
  ];

  // Fully-qualified storage URL as built by the worker
  // (e.g. "s3://bucket/prefix/job_xxx/thumbnails/thumb_0.jpg"). Stored as-is
  // and echoed on the Job response, exactly like JobOutput.output_url.
  string url = 2;

  // Generation mode that produced this file: single | interval | sprite |
  // timestamps | animated. Lowercase string on the wire.
  string mode = 3;

  // File format: jpeg | png | webp. The sprite mode's WebVTT sidecar uses
  // "vtt". Animated mode yields "webp" (the animated WebP) and "mp4" (the muted
  // MP4 loop) — "mp4" rides this free-form string; it is not a ThumbnailFormat
  // enum value.
  string format = 4;

  // Pixel dimensions. 0 when not applicable (e.g. the .vtt sidecar).
  int32 width = 5;
  int32 height = 6;

  // 0-based index within a multi-file spec (interval frames, sprite tiles).
  int32 index = 7;
}
