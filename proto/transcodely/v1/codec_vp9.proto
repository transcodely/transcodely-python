// VP9/libvpx-vp9 codec options for video encoding.
syntax = "proto3";

package transcodely.v1;

import "buf/validate/validate.proto";

// VP9/libvpx-vp9 encoder options for fine-tuning encoding parameters.
// All fields are optional - sensible defaults are applied based on quality tier.
//
// Key differences from H.264/H.265:
// - Uses 'speed' (0-8) instead of 'preset'
// - Uses 'quality' instead of 'tune'
// - No 'level' parameter (VP9 doesn't have the same level system)
// - Numeric profiles (0-3) instead of string names
// - CRF range is 15-50 (different scale than H.264)
// - Lower maximum bitrate (150 Mbps vs 240 Mbps for H.264)
//
// Restrictions (enforced by semantic validation, not protovalidate):
// - crf: must be 15-50 (0-14 produces lossless, 51-63 produces garbage)
// - threads: not allowed (infrastructure control)
//
// Common mistakes:
// - Don't use H.264/x264 parameters like 'preset', 'tune', or 'level' with VP9
// - Use 'speed' (0-8) to control encoding speed instead of 'preset'
// - Use 'quality' (good/best/realtime) instead of 'tune'
//
// See docs/codec-implementation/03-vp9.md for detailed documentation.
message VP9Options {
  // VP9 profile (color format and bit depth).
  // 0: 8-bit 4:2:0 (most compatible, recommended)
  // 1: 8-bit 4:2:2 or 4:4:4
  // 2: 10-bit or 12-bit 4:2:0
  // 3: 10-bit or 12-bit 4:2:2 or 4:4:4
  // Default: 0 (8-bit 4:2:0 for maximum compatibility)
  optional int32 profile = 1 [
    (buf.validate.field).int32.gte = 0,
    (buf.validate.field).int32.lte = 3
  ];

  // Quality/speed trade-off mode.
  // - "good": Balanced quality and speed (default)
  // - "best": Highest quality, slowest encoding
  // - "realtime": Fastest encoding, lower quality (for live streaming)
  // Default: "good"
  optional string quality = 2 [
    (buf.validate.field).string.max_len = 20
  ];

  // Constant Rate Factor (quality-based encoding).
  // Range: 15-50 (lower = higher quality, larger file)
  // Note: VP9 uses a different CRF scale than H.264
  // Default: determined by quality_tier (economy=50, standard=40, premium=30)
  // Mutually exclusive with bitrate.
  optional int32 crf = 3 [
    (buf.validate.field).int32.gte = 0,
    (buf.validate.field).int32.lte = 63
  ];

  // CPU speed/quality preset (0-8).
  // 0: Slowest encoding, best quality
  // 4: Balanced (recommended for premium)
  // 6: Faster encoding (recommended for standard)
  // 8: Fastest encoding, lower quality (recommended for economy)
  // Default: determined by quality_tier
  optional int32 speed = 4 [
    (buf.validate.field).int32.gte = 0,
    (buf.validate.field).int32.lte = 8
  ];

  // Target bitrate in Kbps (size-based encoding).
  // Range: 100-150000 (100 Kbps to 150 Mbps)
  // Note: Mutually exclusive with CRF.
  optional int32 bitrate = 5 [
    (buf.validate.field).int32.gte = 100,
    (buf.validate.field).int32.lte = 150000
  ];

  // Minimum bitrate in Kbps (for variable bitrate encoding).
  // Range: 100-150000
  // Must be less than or equal to target bitrate if both are set.
  optional int32 min_bitrate = 6 [
    (buf.validate.field).int32.gte = 100,
    (buf.validate.field).int32.lte = 150000
  ];

  // Maximum bitrate in Kbps (for variable bitrate encoding).
  // Range: 100-150000
  // Must be greater than or equal to target bitrate if both are set.
  optional int32 max_bitrate = 7 [
    (buf.validate.field).int32.gte = 100,
    (buf.validate.field).int32.lte = 150000
  ];

  // Maximum keyframe interval (GOP size) in frames.
  // Range: 1-600
  // Default: 250
  optional int32 keyint = 8 [
    (buf.validate.field).int32.gte = 1,
    (buf.validate.field).int32.lte = 600
  ];

  // Number of tile columns for parallel encoding (0-6).
  // Tiles divide the frame for multi-threaded encoding.
  // Higher values = more parallelism but slightly lower compression.
  // Range: 0-6 (0 = auto, 1 = no tiling, 2+ = log2 of tile columns)
  // Default: auto-selected based on resolution
  optional int32 tile_columns = 9 [
    (buf.validate.field).int32.gte = 0,
    (buf.validate.field).int32.lte = 6
  ];

  // Number of tile rows for parallel encoding (0-2).
  // Range: 0-2 (0 = auto, 1 = no tiling, 2+ = log2 of tile rows)
  // Default: auto-selected based on resolution
  optional int32 tile_rows = 10 [
    (buf.validate.field).int32.gte = 0,
    (buf.validate.field).int32.lte = 2
  ];
}
