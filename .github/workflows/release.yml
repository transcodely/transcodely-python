name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  # ============================================================================
  # Release Please — opens / updates the release PR, tags + creates a Release
  # when the PR is merged.
  # ============================================================================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Publish to PyPI — runs only when release-please created a tag + Release
  # in the previous job. Re-runs the test + build gate as defense-in-depth,
  # then publishes via the PyPI Trusted Publisher OIDC flow (no API token).
  #
  # Prerequisite (one-time, user-side): on pypi.org → Your projects →
  # Publishing → "Add a new pending publisher" with:
  #   PyPI project name: transcodely
  #   Owner:             transcodely
  #   Repository:        transcodely-python
  #   Workflow name:     release.yml
  #   Environment:       pypi
  # ============================================================================
  publish-pypi:
    name: Publish to PyPI
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/transcodely
    permissions:
      contents: read
      id-token: write   # OIDC for PyPI Trusted Publisher
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build

      - name: Run tests
        run: pytest tests/ -q

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Release Summary
        run: |
          echo "## PyPI release published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${{ needs.release-please.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ needs.release-please.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Install:** \`pip install transcodely==${{ needs.release-please.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **PyPI:** https://pypi.org/project/transcodely/${{ needs.release-please.outputs.version }}/" >> $GITHUB_STEP_SUMMARY
