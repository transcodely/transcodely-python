name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - name: Lint PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed conventional-commit types — must match the
          # changelog-sections in release-please-config.json.
          types: |
            feat
            fix
            perf
            revert
            docs
            style
            chore
            refactor
            test
            build
            ci
          # Subject must start lowercase (`feat: add jobs.estimate()`),
          # not Title Case (`feat: Add jobs.estimate()`).
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure the subject
            starts with a lowercase letter (e.g. "feat: add foo", not
            "feat: Add foo").
          # Squash-merge will use this title as the commit message, so it
          # must already be a valid conventional commit.
          validateSingleCommit: false
